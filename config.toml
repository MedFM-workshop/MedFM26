base_url = "https://medfm-workshop.github.io/MedFM26/"
compile_sass = true
build_search_index = false
generate_feeds = false
minify_html = true

[markdown]
highlight_code = true
highlight_theme = "css"
smart_punctuation = true

[extra]
footer_text = "This website is built using [Zola](https://www.getzola.org) and the [Academic Workshop](http://github.com/aterenin/academic-workshop/) theme, which is [designed to last](https://jeffhuang.com/designed_to_last/)."
title = {tagline = "MedFM", title = "1st Workshop on Medical Foundation Models: From Pretraining to Clinical Impact", subtitles = ["at HAICON 2026, June 8, Munich"]}
banner = {extension = "svg", size = "fixed", fade = true}
# buttons = [{name="GitHub", url="https://github.com/MedFM-workshop/MedFM26"}]
image = {resize = 400, ext = '.jpg'}
list_page_limit = 10
header_pages = [{name = "Home", url = "/#home"},{name = "Design", url = "/#design"}]
button_shortcuts = [{variable = "video", name = "Video"}]
